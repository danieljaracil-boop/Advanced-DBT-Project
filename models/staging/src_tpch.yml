version: 3

sources:
  - name: tpch_source
    database: SNOWFLAKE_SAMPLE_DATA
    schema: TPCH_SF1
    description: "Fuente de datos TPC-H para analítica de cadena de suministro."
    
    freshness: 
      warn_after: 
        count: 24
        period: hour
      error_after: 
        count: 48
        period: hour
      loaded_at_field: o_orderdate 
    tables:
      - name: orders
        description: "Cabeceras de pedidos"
      - name: lineitem
        description: "Detalle de artículos por pedido"
      - name: customer
      - name: part
      - name: supplier
      - name: partsupp
      - name: nation
      - name: region