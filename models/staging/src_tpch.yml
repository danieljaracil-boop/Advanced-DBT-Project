version: 2

sources:
  - name: tpch_source
    database: SNOWFLAKE_SAMPLE_DATA
    schema: TPCH_SF1
    config: # Envuelve el freshness aquí
      freshness: 
        warn_after: {count: 24, period: hour}
        error_after: {count: 48, period: hour}
      loaded_at_field: o_orderdate
      
    tables:
      - name: orders
        description: "Cabeceras de pedidos"
      - name: lineitem
        description: "Detalle de artículos por pedido"
      - name: customer
        description: "Información de clientes"
      - name: part
      - name: supplier
      - name: partsupp
      - name: nation
      - name: region