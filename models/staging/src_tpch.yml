version: 2

sources:
  - name: tpch_source
    database: SNOWFLAKE_SAMPLE_DATA
    schema: TPCH_SF1
    # Configuración global 
    config: 
          freshness: 
            warn_after: {count: 365, period: day}
            error_after: {count: 730, period: day}
          loaded_at_field: o_orderdate 
    tables:
      - name: orders
        description: "Tabla que contiene el histórico de órdenes de compra." 
        columns:
          - name: o_orderkey
            description: "Clave primaria de la orden." 
          - name: o_orderdate
            description: "Fecha en la que se realizó el pedido." 
          - name: o_custkey
            description: "Clave foránea que referencia al cliente que realizó el pedido."
          - name: o_orderstatus
            description: "Estado actual de la orden (F, O, P)."
          - name: o_totalprice
            description: "Precio total de la orden incluyendo impuestos."
          - name: o_orderdate
            description: "Fecha de registro de la orden."
          - name: o_orderpriority
            description: "Prioridad asignada a la orden."
          - name: o_clerk
            description: "Identificador del empleado que procesó la orden."
          - name: o_shippriority
            description: "Prioridad de envío."
          - name: o_comment
            description: "Comentarios adicionales de la orden."
      - name: customer
        description: "Información demográfica de los clientes." 
        columns:
          - name: c_custkey
            description: "Identificador único del cliente." 
          - name: c_name
            description: "Nombre completo del cliente." 
          - name: c_address
            description: "Dirección física del cliente."
          - name: c_nationkey
            description: "Clave foránea de la nación del cliente."
          - name: c_phone
            description: "Número de contacto telefónico."
          - name: c_acctbal
            description: "Saldo actual de la cuenta del cliente."
          - name: c_mktsegment
            description: "Segmento de mercado al que pertenece el cliente."
          - name: c_comment
            description: "Comentarios generales del cliente."
      - name: lineitem
        description: "Detalle individual de los artículos por cada orden."
        columns:
          - name: l_orderkey
            description: "Referencia a la cabecera de la orden."
          - name: l_partkey
            description: "Referencia al producto vendido."
          - name: l_suppkey
            description: "Referencia al proveedor del producto."
          - name: l_linenumber
            description: "Número de línea dentro de la orden."
          - name: l_quantity
            description: "Cantidad de unidades."
          - name: l_extendedprice
            description: "Precio de lista multiplicado por la cantidad."
          - name: l_discount
            description: "Tasa de descuento aplicada."
          - name: l_tax
            description: "Tasa de impuesto aplicada."
          - name: l_returnflag
            description: "Indicador de devolución de la mercancía."
          - name: l_linestatus
            description: "Estado de la línea de pedido."
          - name: l_shipdate
            description: "Fecha de envío."
          - name: l_commitdate
            description: "Fecha de compromiso de entrega."
          - name: l_receiptdate
            description: "Fecha de recepción por el cliente."
          - name: l_shipinstruct
            description: "Instrucciones de envío."
          - name: l_shipmode
            description: "Modo de transporte."
          - name: l_comment
            description: "Comentarios de la línea."
      - name: part
        description: "Información de las partes o productos." 
        columns:
          - name: p_partkey
            description: "Identificador único de la parte o producto." 
          - name: p_name
            description: "Nombre de la parte o producto." 
          - name: p_mfgr
            description: "Fabricante de la parte o producto." 
          - name: p_brand
            description: "Marca comercial."
          - name: p_type
            description: "Tipo de producto."
          - name: p_size
            description: "Tamaño del producto."
          - name: p_container
            description: "Tipo de contenedor de empaque."
          - name: p_retailprice
            description: "Precio de venta sugerido."
          - name: p_comment
            description: "Comentarios del producto."
      - name: supplier
        description: "Información de los proveedores." 
        columns:
          - name: s_suppkey
            description: "Identificador único del proveedor." 
          - name: s_name
            description: "Nombre del proveedor." 
          - name: s_address
            description: "Dirección del proveedor." 
          - name: s_nationkey
            description: "Clave foránea que referencia a la nación del proveedor." 
          - name: s_phone
            description: "Número de teléfono del proveedor." 
          - name: s_acctbal
            description: "Balance de la cuenta del proveedor." 
          - name: s_comment
            description: "Comentarios adicionales sobre el proveedor."
      - name: partsupp
        description: "Información de la disponibilidad de partes por proveedor."
        columns:
          - name: ps_partkey
            description: "Clave foránea que referencia a la parte o producto." 
          - name: ps_suppkey
            description: "Clave foránea que referencia al proveedor." 
          - name: ps_availqty
            description: "Cantidad disponible de la parte por el proveedor." 
          - name: ps_supplycost
            description: "Costo de suministro de la parte por el proveedor." 
          - name: ps_comment
            description: "Comentarios adicionales sobre la disponibilidad de la parte por el proveedor." 
      - name: nation
        description: "Información de las naciones." 
        columns:
          - name: n_nationkey
            description: "Clave foránea que referencia a la nación." 
          - name: n_name
            description: "Nombre de la nación." 
          - name: n_regionkey
            description: "Clave foránea que referencia a la región a la que pertenece la nación." 
      - name: region
        description: "Información de las regiones." 
        columns:
          - name: r_regionkey
            description: "Clave foránea que referencia a la región." 
          - name: r_name
            description: "Nombre de la región."