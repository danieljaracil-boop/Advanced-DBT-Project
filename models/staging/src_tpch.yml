version: 2

sources:
  - name: tpch_source
    database: SNOWFLAKE_SAMPLE_DATA
    schema: TPCH_SF1
    # Configuración global de frescura para esta fuente
    config: # <--- Añade esta línea
          freshness: # <--- Mueve esto aquí dentro
            warn_after: {count: 24, period: hour}
            error_after: {count: 48, period: hour}
          loaded_at_field: o_orderdate # Campo que dbt usará para calcular la antigüedad del dato
    
    tables:
      - name: orders
      - name: lineitem
      - name: customer
      - name: part
      - name: supplier