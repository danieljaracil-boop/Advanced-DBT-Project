version: 3 # Upgraded versioning for the new engine

models:
  - name: stg_orders
    description: "Tabla de pedidos limpia y estandarizada con carga incremental."
    # New engine requirement: Explicitly define the materialization contract if using incremental
    config:
      materialized: incremental
      incremental_strategy: merge
      unique_key: order_id

    columns:
      - name: status_code
        description: "Código de estado del pedido (P=Pendiente, O=Abierto, F=Finalizado)."
        data_tests: 
          - accepted_values:
              arguments:
                  values: ['P', 'O', 'F']

      - name: order_priority
        description: "Código de prioridad del pedido (H=Alta, L=Baja, M=Media, U=Urgente, NS=Sin especificar)."
        data_tests: 
          - accepted_values:
              arguments:
                values: ['H', 'L', 'M', 'U', 'NS']
          
      - name: order_id
        description: "Número de identificación único del pedido."
        data_tests: 
          - unique
          - not_null 

  - name: stg_parts
    description: "Tabla de partes con información estandarizada."
    columns:
      - name: part_id
        description: "Número de identificación único de la parte."
        data_tests: 
          - unique
          - not_null

  