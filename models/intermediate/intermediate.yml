version: 2

models:
  - name: int_locations
    description: "Capa intermedia que consolida la información geográfica. Une los datos de naciones y regiones para crear una jerarquía espacial completa."
    columns:
      - name: location_id
        description: "Clave única de la ubicación (PK)."
        tests:
          - unique
          - not_null
      - name: nation_name
        description: "Nombre de la nación (ej. SPAIN, GERMANY)."
      - name: region_name
        description: "Nombre de la región a la que pertenece la nación (ej. EUROPE, AMERICA)."

  - name: int_order_items
    description: "Modelo intermedio que desglosa las líneas de pedido (lineitems) enriquecidas con información de la orden y cálculos de negocio."
    columns:
      - name: order_item_id
        description: "Identificador único de la línea de pedido (PK)."
        tests:
          - unique
          - not_null
      - name: order_key
        description: "Clave foránea que conecta con el modelo de órdenes."
      - name: part_key
        description: "Clave foránea que conecta con el catálogo de partes/productos."
      - name: quantity
        description: "Cantidad de unidades del producto en esta línea."
      - name: extended_price
        description: "Precio bruto antes de descuentos e impuestos."
      - name: discount_amount
        description: "Monto del descuento aplicado (calculado mediante macro personalizada)."
      - name: net_item_sales_amount
        description: "Importe neto final de la línea de pedido tras aplicar descuentos."
      - name: order_date
        description: "Fecha de la orden asociada a este ítem."