version: 2

models:
  - name: int_locations
    description: "Capa intermedia que consolida la información geográfica. Une los datos de naciones y regiones para crear una jerarquía espacial completa."
    columns:
      - name: nation_id
        description: "Clave única de la ubicación (PK)."
        tests:
          - unique
          - not_null
      - name: nation_name
        description: "Nombre de la nación (ej. SPAIN, GERMANY)."
      - name: region_name
        description: "Nombre de la región a la que pertenece la nación (ej. EUROPE, AMERICA)."

  - name: int_order_items
    description: "Modelo intermedio que une líneas de pedido con órdenes y proveedores para enriquecer la información transaccional y aplicar cálculos de negocio."
    columns:
      - name: lineitem_id
        description: "Identificador único de la línea de pedido (PK)."
      - name: order_id
        description: "Identificador único de la orden de compra asociada."
      - name: customer_id
        description: "Identificador del cliente que realizó la orden."
      - name: part_id
        description: "Identificador de la parte o producto vendido."
      - name: supplier_id
        description: "Identificador del proveedor que suministra el producto."
      - name: nation_id
        description: "Identificador del país de origen del proveedor, facilitando el análisis geográfico por ítem."
      - name: order_date
        description: "Fecha en la que se registró la orden original."
      - name: quantity
        description: "Cantidad de unidades vendidas en esta línea específica."
      - name: net_item_sales_amount
        description: "Importe neto de la venta tras aplicar el porcentaje de descuento sobre el precio extendido, calculado mediante macro personalizada."
      