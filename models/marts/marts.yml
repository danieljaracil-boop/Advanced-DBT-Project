version: 2

models:
  - name: fct_sales
    description: "Tabla de hechos de ventas"
    columns:
      - name: lineitem_id
        description: "Identificador único de cada línea de venta"
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: "Identificador único del cliente"
        data_tests:
          - relationships:
                to: ref('dim_customers')
                field: customer_id
      - name: net_item_sales_amount
        description: "Monto neto de ventas por línea de producto"
        data_tests:
          - test_no_negative_values
      - name: nation_id
        description: "Identificador único de la nación"
        data_tests:
          - relationships:
                to: ref('dim_locations')
                field: nation_id
      - name: supplier_id
        description: "Identificador único del proveedor"
      - name: order_date_id
        description: "Identificador único de la fecha del pedido"
        data_tests:
          - relationships:
                to: ref('dim_date')
                field: date_id
      - name: total_order_amount
        description: "Monto total del pedido"
        data_tests:
          - test_no_negative_values

  - name: dim_customers
    description: "Dimensión de clientes"
    columns:
      - name: customer_id
        description: "Identificador único del cliente"
        data_tests:
          - unique
          - not_null
      - name: customer_name
        description: "Nombre completo del cliente."
      - name: address
        description: "Dirección física registrada."
      - name: phone_number
        description: "Teléfono de contacto."

  - name: dim_date
    description: "Dimensión de tiempo"
    columns:
      - name: date_id
        description: "Identificador único de la fecha."
        data_tests:
          - unique
          - not_null
      - name: year
        description: "Año de la fecha." 
      - name: month
        description: "Mes de la fecha."
      - name: day
        description: "Día del mes de la fecha."
      - name: day_of_week
        description: "Día de la semana de la fecha."
          
  - name: dim_locations
    description: "Dimensión de ubicación"
    columns:
      - name: nation_id
        description: "Identificador único de la nación."
        data_tests:
          - unique
          - not_null
      - name: nation_name
        description: "Nombre de la nación."
      - name: region_name
        description: "Nombre de la región a la que pertenece la nación."
          