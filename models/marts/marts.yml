version: 3 # Recommended for the latest Fusion Engine

models:
  - name: fct_sales
    description: "Tabla de hechos de ventas"
    columns:
      - name: lineitem_id
        data_tests:
          - unique
          - not_null
          
      - name: customer_id
        data_tests:
          # The 'arguments' key is deprecated. Use direct named parameters.
          - relationships:
              to: ref('dim_customers')
              field: customer_id
              
      - name: net_item_sales_amount
        data_tests:
          - test_no_negative_values
          
      - name: nation_id
        data_tests:
          - relationships:
              to: ref('dim_locations')
              field: nation_id

  - name: dim_customers
    description: "Dimensión de clientes"
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null

  - name: dim_date
    description: "Dimensión de tiempo"
    columns:
      - name: date_id
        data_tests:
          - unique
          - not_null
          
  - name: dim_locations
    description: "Dimensión de ubicación"
    columns:
      - name: nation_id
        data_tests:
          - unique
          - not_null         